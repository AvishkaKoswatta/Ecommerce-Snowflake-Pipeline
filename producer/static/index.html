<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #c8f54a;
      --accent2: #4af5c8;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #f54a4a;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,245,74,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,74,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    header span {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.875rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 0;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,245,74,0.1);
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }

    /* Products */
    .product-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 1.1rem;
      margin-bottom: 0.75rem;
      position: relative;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.9rem;
    }

    .product-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent2);
      letter-spacing: 0.1em;
    }

    .btn-remove {
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-remove:hover { background: rgba(245,74,74,0.12); }

    .btn-add {
      background: none;
      border: 1px dashed var(--accent2);
      color: var(--accent2);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.55rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
      letter-spacing: 0.05em;
    }
    .btn-add:hover { background: rgba(74,245,200,0.07); }

    .total-display {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent);
      text-align: right;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    .total-display small {
      font-size: 0.65rem;
      color: var(--muted);
      display: block;
      margin-bottom: 0.2rem;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 9px;
      font-family: var(--sans);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.02em;
      padding: 0.9rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 1.25rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,245,74,0.25);
    }

    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      max-width: 340px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* JSON Preview */
    #json-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      white-space: pre;
      overflow-x: auto;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      margin-top: 1rem;
      line-height: 1.6;
    }

    #json-preview.visible { display: block; animation: slideIn 0.2s ease; }

    .preview-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.35rem 0.75rem;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 1rem;
      transition: color 0.2s, border-color 0.2s;
    }
    .preview-toggle:hover { color: var(--text); border-color: var(--text); }

    select option { background: #1a1a22; }

    input[readonly] {
      color: var(--accent2);
      opacity: 0.85;
      cursor: default;
      border-style: dashed;
    }

    .product-mapped {
      animation: slideIn 0.2s ease;
    }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Order Generator</h1>
    <span>JSON → local filesystem</span>
  </header>

  <form id="orderForm">

    <!-- Order Info -->
    <div class="card">
      <div class="card-title">Order Info</div>
      <div class="grid-2">
        <div class="field">
          <label>ORDER ID</label>
          <input type="number" id="order_id" placeholder="e.g. 13" required min="1"/>
        </div>
        <div class="field">
          <label>ORDER DATE</label>
          <input type="date" id="order_date" required/>
        </div>
      </div>
    </div>

    <!-- Customer Info -->
    <div class="card">
      <div class="card-title">Customer</div>
      <div class="grid-2">
        <div class="field">
          <label>CUSTOMER ID</label>
          <input type="number" id="customer_id" placeholder="e.g. 110" required/>
        </div>
        <div class="field">
          <label>FULL NAME</label>
          <input type="text" id="customer_name" placeholder="e.g. John Doe" required/>
        </div>
        <div class="field">
          <label>EMAIL</label>
          <input type="email" id="customer_email" placeholder="e.g. john@example.com" required/>
        </div>
        <div class="field">
          <label>ADDRESS</label>
          <input type="text" id="customer_address" placeholder="e.g. 123 Main St Springfield" required/>
        </div>
      </div>
    </div>

    <!-- Products -->
    <div class="card">
      <div class="card-title">Products</div>
      <div id="products-container"></div>
      <button type="button" class="btn-add" onclick="addProduct()">+ Add Product</button>

      <div class="total-display">
        <small>TOTAL AMOUNT</small>
        $<span id="total">0.00</span>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Generate & Save Order JSON</button>

    <button type="button" class="preview-toggle" onclick="togglePreview()">{ } Preview JSON</button>
    <pre id="json-preview"></pre>

  </form>
</div>

<div id="toast"></div>

<script>
  let productCount = 0;

  const PRODUCTS = [
    { product_id: 'P01', name: 'Wireless Mouse',      category: 'Electronics', price: 25.00 },
    { product_id: 'P02', name: 'Bluetooth Keyboard',  category: 'Electronics', price: 45.00 },
    { product_id: 'P03', name: 'Laptop Stand',        category: 'Electronics', price: 75.00 },
    { product_id: 'P04', name: 'Gaming Headset',      category: 'Electronics', price: 60.00 },
    { product_id: 'P05', name: 'Desk Organizer',      category: 'Furniture',   price: 30.00 },
  ];

  function addProduct(defaults = {}) {
    productCount++;
    const id = productCount;
    const container = document.getElementById('products-container');

    const selectedId = defaults.product_id || '';
    const optionsHtml = `<option value="">— Select a product —</option>` +
      PRODUCTS.map(p =>
        `<option value="${p.product_id}" ${p.product_id === selectedId ? 'selected' : ''}>
          [${p.product_id}] ${p.name}
        </option>`
      ).join('');

    const div = document.createElement('div');
    div.className = 'product-item';
    div.id = `product-${id}`;
    div.innerHTML = `
      <div class="product-header">
        <span class="product-label">PRODUCT #${id}</span>
        <button type="button" class="btn-remove" onclick="removeProduct(${id})">✕ Remove</button>
      </div>
      <div class="field">
        <label>SELECT PRODUCT</label>
        <select class="p-select" onchange="onProductSelect(this, ${id})" required>
          ${optionsHtml}
        </select>
      </div>
      <div class="product-mapped" id="mapped-${id}" style="display:none">
        <div class="grid-3" style="margin-top:0.85rem">
          <div class="field">
            <label>PRODUCT ID</label>
            <input type="text" class="p-pid" readonly tabindex="-1"/>
          </div>
          <div class="field">
            <label>CATEGORY</label>
            <input type="text" class="p-cat" readonly tabindex="-1"/>
          </div>
          <div class="field">
            <label>UNIT PRICE ($)</label>
            <input type="text" class="p-price" readonly tabindex="-1"/>
          </div>
        </div>
        <div class="grid-2" style="margin-top:0">
          <div class="field">
            <label>QUANTITY</label>
            <input type="number" class="p-qty" placeholder="1" min="1" value="${defaults.quantity||1}" required oninput="updateTotal()"/>
          </div>
          <div class="field">
            <label>LINE TOTAL ($)</label>
            <input type="text" class="p-linetotal" readonly tabindex="-1"/>
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);

    // If defaults provided, trigger auto-fill
    if (selectedId) {
      const sel = div.querySelector('.p-select');
      onProductSelect(sel, id);
      if (defaults.quantity) div.querySelector('.p-qty').value = defaults.quantity;
    }

    updateTotal();
    updatePreview();
  }

  function onProductSelect(sel, id) {
    const pid = sel.value;
    const mapped = document.getElementById(`mapped-${id}`);
    const item = document.getElementById(`product-${id}`);

    if (!pid) {
      mapped.style.display = 'none';
      updateTotal();
      return;
    }

    const product = PRODUCTS.find(p => p.product_id === pid);
    if (!product) return;

    item.querySelector('.p-pid').value   = product.product_id;
    item.querySelector('.p-cat').value   = product.category;
    item.querySelector('.p-price').value = product.price.toFixed(2);

    mapped.style.display = 'block';
    updateLineTotal(id);
    updateTotal();
    updatePreview();
  }

  function updateLineTotal(id) {
    const item = document.getElementById(`product-${id}`);
    if (!item) return;
    const price = parseFloat(item.querySelector('.p-price').value) || 0;
    const qty   = parseInt(item.querySelector('.p-qty').value)    || 0;
    const lt    = item.querySelector('.p-linetotal');
    if (lt) lt.value = '$' + (price * qty).toFixed(2);
  }

  function removeProduct(id) {
    const el = document.getElementById(`product-${id}`);
    if (el) el.remove();
    updateTotal();
    updatePreview();
  }

  function updateTotal() {
    const items = document.querySelectorAll('.product-item');
    let total = 0;
    items.forEach(item => {
      const priceEl = item.querySelector('.p-price');
      const qtyEl   = item.querySelector('.p-qty');
      const price   = parseFloat(priceEl ? priceEl.value : 0) || 0;
      const qty     = parseInt(qtyEl ? qtyEl.value : 0)       || 0;
      total += price * qty;
      const id = item.id.replace('product-', '');
      updateLineTotal(id);
    });
    document.getElementById('total').textContent = total.toFixed(2);
    updatePreview();
  }

  function buildOrderObj() {
    const items = document.querySelectorAll('.product-item');
    const products = [];
    items.forEach(item => {
      const sel = item.querySelector('.p-select');
      const pid = sel ? sel.value : '';
      if (!pid) return;
      const product = PRODUCTS.find(p => p.product_id === pid);
      if (!product) return;
      products.push({
        product_id: product.product_id,
        name:       product.name,
        category:   product.category,
        price:      product.price,
        quantity:   parseInt(item.querySelector('.p-qty').value) || 1
      });
    });

    const total = products.reduce((s, p) => s + p.price * p.quantity, 0);

    return {
      order_id: parseInt(document.getElementById('order_id').value) || null,
      order_date: document.getElementById('order_date').value,
      total_amount: Math.round(total * 100) / 100,
      customer: {
        customer_id: parseInt(document.getElementById('customer_id').value) || null,
        name: document.getElementById('customer_name').value,
        email: document.getElementById('customer_email').value,
        address: document.getElementById('customer_address').value
      },
      products
    };
  }

  function togglePreview() {
    const pre = document.getElementById('json-preview');
    pre.classList.toggle('visible');
    if (pre.classList.contains('visible')) updatePreview();
  }

  function updatePreview() {
    const pre = document.getElementById('json-preview');
    if (!pre.classList.contains('visible')) return;
    pre.textContent = JSON.stringify(buildOrderObj(), null, 2);
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 4000);
  }

  document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const order = buildOrderObj();
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      const data = await res.json();
      if (data.success) {
        showToast(`✓ ${data.message}`, 'success');
        // show preview of saved json
        const pre = document.getElementById('json-preview');
        pre.classList.add('visible');
        pre.textContent = JSON.stringify(data.order, null, 2);
      } else {
        showToast('Error saving order', 'error');
      }
    } catch (err) {
      showToast('Server error: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Generate & Save Order JSON';
  });

  // Set today's date and add first product on load
  document.getElementById('order_date').value = new Date().toISOString().split('T')[0];
  addProduct();
</script>
</body>
</html>
